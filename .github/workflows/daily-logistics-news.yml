name: Daily Logistics News Update

on:
  schedule:
    - cron: "35 13 * * *" # 8:35am Eastern in standard time
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-logistics-news
  cancel-in-progress: false

jobs:
  update-blog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Update blog from RSS feeds
        run: python3 admin/update_blog_news.py --apply

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- blog.html; then
            echo "No changes in blog.html"
            exit 0
          fi

          git config user.name "miami3pl-bot"
          git config user.email "actions@users.noreply.github.com"
          git add blog.html
          TODAY="$(date -u +%Y-%m-%d)"
          git commit -m "Daily blog update: ${TODAY}"
          git push
