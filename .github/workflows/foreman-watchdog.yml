name: Codex Opus Foreman Watchdog

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  watchdog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run watchdog lanes
        run: |
          chmod +x scripts/foreman_watchdog.sh
          scripts/foreman_watchdog.sh

      - name: Upload watchdog artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: foreman-watchdog-artifacts
          path: .tmp/foreman-watchdog/
